---
name: Release
description: Automated release workflow for multi-package repositories

inputs:
  token:
    description: GitHub token for API access
    required: true
  release_token:
    description: GitHub token for creating PRs
    required: false
    default: ""
  packages:
    description: JSON array of packages to release
    required: true
  version_bump:
    description: Manual version bump override
    required: false
    default: patch
  tag_prefix:
    description: Prefix for git tags
    required: false
    default: ""
  release_mode:
    description: 'Release mode: pr (create PR), direct (commit+tag), merge (tag+release after PR merge)'
    required: false
    default: pr

outputs:
  released:
    description: Whether a release was created
    value: ${{ steps.result.outputs.released }}
  versions:
    description: JSON object of released versions
    value: ${{ steps.result.outputs.versions }}

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Analyze and create release
      id: result
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        RELEASE_TOKEN: ${{ inputs.release_token }}
        PACKAGES: ${{ inputs.packages }}
        USER_BUMP: ${{ inputs.version_bump }}
        TAG_PREFIX: ${{ inputs.tag_prefix }}
        RELEASE_MODE: ${{ inputs.release_mode }}
      run: |
        if [ -z "$RELEASE_TOKEN" ]; then
          RELEASE_TOKEN="$GH_TOKEN"
        fi
        
        echo "Release mode: $RELEASE_MODE"
        
        # Handle merge mode separately - just read versions and create tags/releases
        if [ "$RELEASE_MODE" = "merge" ]; then
          echo "Merge mode: reading versions from merged files"
          
          versions_json="{}"
          while read -r pkg; do
            pkg_name=$(echo "$pkg" | jq -r '.name')
            pkg_path=$(echo "$pkg" | jq -r '.path')
            new_version=$(grep -m1 "^version = " "$pkg_path/Cargo.toml" | sed 's/version = "\(.*\)"/\1/')
            if [ -n "$new_version" ]; then
              versions_json=$(echo "$versions_json" | jq -c ". + {\"$pkg_name\": \"$new_version\"}")
              echo "  $pkg_name: $new_version"
            fi
          done <<< "$(echo "$PACKAGES" | jq -c '.[]')"
          
          echo "released=true" >> $GITHUB_OUTPUT
          printf "versions=%s" "$versions_json" >> $GITHUB_OUTPUT
          
          # Configure git
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Create tags
          while read -r pkg; do
            pkg_name=$(echo "$pkg" | jq -r '.name')
            new_version=$(echo "$versions_json" | jq -r ".\"$pkg_name\"")
            if [ "$new_version" != "null" ]; then
              full_tag="${TAG_PREFIX}${pkg_name}-${new_version}"
              git tag -d "$full_tag" 2>/dev/null || true
              git tag "$full_tag"
              echo "  Tag: $full_tag"
            fi
          done <<< "$(echo "$PACKAGES" | jq -c '.[]')"
          
          # Push tags individually with force to handle race conditions
          while read -r pkg; do
            pkg_name=$(echo "$pkg" | jq -r '.name')
            new_version=$(echo "$versions_json" | jq -r ".\"$pkg_name\"")
            if [ "$new_version" != "null" ]; then
              full_tag="${TAG_PREFIX}${pkg_name}-${new_version}"
              git push origin "$full_tag" --force 2>/dev/null || git push origin "$full_tag" 2>/dev/null || true
              echo "  Tag pushed: $full_tag"
            fi
          done <<< "$(echo "$PACKAGES" | jq -c '.[]')"
          
          # Create GitHub releases
          export GH_TOKEN="$RELEASE_TOKEN"
          while read -r pkg; do
            pkg_name=$(echo "$pkg" | jq -r '.name')
            pkg_path=$(echo "$pkg" | jq -r '.path')
            new_version=$(echo "$versions_json" | jq -r ".\"$pkg_name\"")
            if [ "$new_version" != "null" ]; then
              full_tag="${TAG_PREFIX}${pkg_name}-${new_version}"
              LAST_TAG=$(git describe --tags --abbrev=0 --match "${TAG_PREFIX}${pkg_name}-*" 2>/dev/null | tail -1 || echo "")
              if [ -n "$LAST_TAG" ]; then
                last_ver=$(echo "$LAST_TAG" | sed "s/${TAG_PREFIX}${pkg_name}-//")
                CHANGES=$(git log --oneline "${pkg_name}-${last_ver}..HEAD" -- "$pkg_path" 2>/dev/null | head -15 || echo "Release $new_version")
              else
                CHANGES=$(git log --oneline -15 -- "$pkg_path" || echo "Release $new_version")
              fi
              
              gh release create "$full_tag" \
                --title "$pkg_name $new_version" \
                --notes "$CHANGES" \
                --target "$GITHUB_SHA" 2>&1 || echo "  Release $full_tag exists"
              echo "  Release: $full_tag"
            fi
          done <<< "$(echo "$PACKAGES" | jq -c '.[]')"
          
          echo "Done"
          exit 0
        fi
        
        # Normal mode: analyze commits
        should_release="false"
        branch_name="release"
        commit_msg="release"
        versions_json="{}"
        
        while read -r pkg; do
          pkg_path=$(echo "$pkg" | jq -r '.path')
          pkg_name=$(echo "$pkg" | jq -r '.name')
          
          version=$(grep -m1 "^version = " "$pkg_path/Cargo.toml" | sed 's/version = "\(.*\)"/\1/')
          echo "Processing $pkg_name (current: $version)"
          
          last_tag=$(git describe --tags --abbrev=0 --match "${TAG_PREFIX}${pkg_name}-*" 2>/dev/null || echo "none")
          [ -z "$last_tag" ] && last_tag="none"
          
          if [ "$last_tag" != "none" ]; then
            commits=$(git log "$last_tag..HEAD" --oneline -- "$pkg_path" 2>/dev/null || true)
          else
            commits=$(git log --oneline -- "$pkg_path" | head -30 || true)
          fi
          
          has_feat=$(echo "$commits" | grep -cE "\[feat\]|feat:" || true)
          has_break=$(echo "$commits" | grep -cE "!:|BREAKING" || true)
          commit_count=$(echo "$commits" | grep -c . || true)
          
          echo "  Commits since $last_tag: $commit_count"
          
          if [ "$has_break" -gt 0 ]; then
            bump="major"
          elif [ "$has_feat" -gt 0 ] || [ "$USER_BUMP" = "minor" ]; then
            bump="minor"
          else
            bump="$USER_BUMP"
          fi
          
          IFS='.' read -r major minor patch <<< "$version"
          case "$bump" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_version="$major.$minor.$patch"
          
          if [ "$commit_count" -gt 0 ]; then
            sed -i '0,/^version = "/{s/^version = "[^"]*"/version = "'"$new_version"'"/}' "$pkg_path/Cargo.toml"
            echo "  Updated to $new_version"
            
            should_release="true"
            branch_name="${branch_name}-${pkg_name}-${new_version}"
            commit_msg="${commit_msg} ${pkg_name} ${new_version}"
            versions_json=$(echo "$versions_json" | jq -c ". + {\"$pkg_name\": \"$new_version\"}")
          else
            echo "  Skipping - no commits"
          fi
        done <<< "$(echo "$PACKAGES" | jq -c '.[]')"
        
        echo ""
        echo "Should release: $should_release"
        
        if [ "$should_release" = "true" ]; then
          echo "released=true" >> $GITHUB_OUTPUT
          printf "versions=%s" "$versions_json" >> $GITHUB_OUTPUT
          
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ "$RELEASE_MODE" = "direct" ]; then
            echo "Direct: committing to main"
            git add -A
            git commit -m "[lib] $commit_msg"
            git push origin main
            
            while read -r pkg; do
              pkg_name=$(echo "$pkg" | jq -r '.name')
              new_version=$(echo "$versions_json" | jq -r ".\"$pkg_name\"")
              if [ "$new_version" != "null" ]; then
                full_tag="${TAG_PREFIX}${pkg_name}-${new_version}"
                git tag -d "$full_tag" 2>/dev/null || true
                git tag "$full_tag"
                echo "  Tag: $full_tag"
              fi
            done <<< "$(echo "$PACKAGES" | jq -c '.[]')"
            
            git push origin --tags
            echo "Tags pushed"
            
          else
            echo "PR mode: creating branch and PR"
            git checkout -b "$branch_name"
            git add -A
            git commit -m "[lib] $commit_msg"
            
            git push -u origin "$branch_name" --force
            
            pr_title="[lib] release"
            echo "Creating PR: $pr_title"
            
            export GH_TOKEN="$RELEASE_TOKEN"
            gh pr create --repo $GITHUB_REPOSITORY --base main --head "$branch_name" --title "$pr_title" --body "Automated release PR" 2>&1 || echo "PR creation failed"
          fi
        else
          echo "released=false" >> $GITHUB_OUTPUT
          echo "versions={}" >> $GITHUB_OUTPUT
          echo "No commits since last release"
        fi